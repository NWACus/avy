services:
  web:
    image: node:22-bookworm
    working_dir: /workspace
    network_mode: host
    # Run as the workspace owner so files created in the bind mount (node_modules,
    # .env, .expo caches) stay owned by the host user instead of root.
    user: '1001:1001'
    environment:
      HOME: /tmp
      IS_ALLOY: ${IS_ALLOY:-true}
      # Expo/Metro web dev server port. 8080 is reserved for Alloy, so we
      # keep Expo on its default 8081 and expose that as the frontend port.
      EXPO_WEB_PORT: '8081'
      # Non-interactive + CI-friendly startup for the Expo dev server.
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      # Pass a Mapbox access token through from the sandbox process env when one
      # is available, under any of the common variable names. populate-env.sh
      # resolves these into MAPBOX_API_KEY (see app.config.ts). Empty when unset.
      MAPBOX_API_KEY: ${MAPBOX_API_KEY:-}
      EXPO_PUBLIC_MAPBOX_API_KEY: ${EXPO_PUBLIC_MAPBOX_API_KEY:-}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      MAPBOX_PUBLIC_TOKEN: ${MAPBOX_PUBLIC_TOKEN:-}
      MAPBOX_DOWNLOAD_TOKEN: ${MAPBOX_DOWNLOAD_TOKEN:-}
    volumes:
      - .:/workspace
    command: bash -lc "
      ./.alloy/populate-env.sh &&
      (corepack enable || true) &&
      yarn install --frozen-lockfile &&
      yarn expo start --web --port 8081
      "
